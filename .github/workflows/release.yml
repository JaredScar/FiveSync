name: Release (versioned by commit title)

on:
  push:
    branches: [main, master, develop]

jobs:
  extract-version:
    name: Extract version from commit title
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      should_release: ${{ steps.ver.outputs.should_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Extract version from commit title
        id: ver
        shell: bash
        run: |
          title="${{ github.event.head_commit.message }}"
          # Accept formats like:
          #   v1.2.3
          #   1.2.3
          #   Release v1.2.3
          # Must contain exactly one SemVer in the title.
          if [[ "$title" =~ ([0-9]+\.[0-9]+\.[0-9]+) ]]; then
            ver="${BASH_REMATCH[1]}"
            echo "version=$ver" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-publish:
    name: Build installers & publish release
    needs: extract-version
    if: needs.extract-version.outputs.should_release == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
            target: nsis
            platform_flag: --win
          - os: macos-latest
            arch: x64
            target: dmg
            platform_flag: --mac
          - os: ubuntu-latest
            arch: x64
            target: AppImage
            platform_flag: --linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci --legacy-peer-deps

      - name: Bump version in package.json
        shell: bash
        run: |
          VERSION="${{ needs.extract-version.outputs.version }}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Compile app (electron-vite)
        shell: bash
        run: npm run build

      - name: Package ${{ matrix.target }} installer
        shell: bash
        env:
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: "true"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx electron-builder \
            --publish=never \
            ${{ matrix.platform_flag }} ${{ matrix.target }}

      - name: Create/Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.extract-version.outputs.version }}
          name: v${{ needs.extract-version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            release/*.exe
            release/*.msi
            release/*.zip
            release/*.dmg
            release/*.AppImage
            release/*.pkg

